<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS02</title>
</head>
<body>

    <script type="text/javascript" language="javascript">
        // Declaració de variables

        var mailguardat="tvera@ifp-alguero.org";
        var passwordguardada="12345";

        // alert("el mail guardat és "+mailguardat)

        // prompt per demanar dades

        var mailintroduit=prompt("Escriu el teu mail");
        var passwordintroduida=prompt("Introdueix la contrasenya")

        //comparar unes dades amb unes altres
        //&= and != or

        if (mailintroduit == mailguardat & passwordintroduida == passwordguardada)

            {
                document.write("Correcte");
            }

        else {
            document.write("Malament");
        }
        
    </script>
    
</body>
</html>
