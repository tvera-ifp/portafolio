<body>

    <script type="text/javascript" language="javascript">
        // declaració de variables

        var nom;
        var cognom;

        // valor a les variables

        nom="Tolga"
        cognom="Vera"

        // sortida de les dades a la consola

        console.log(nom+" "+cognom)

        // sortida de dades ( strings )

        document.write("L'alumne es diu "+nom+" "+cognom+"</br>")

        // declarem i donem valor a la vegada
        var nom="John"
        var cognom="McClane"

        document.write("L'alumnes es diu "+nom+" "+cognom+"</br>")

        // treballarem amb variables numèriques (integer)

        var preu=10;
        var iva=1;

        document.write("El preu del formatge es "+(preu+iva)+"€</br>")

        var cost=preu+iva

        document.write("El preu del formatge es "+(cost)+"€</br>")

    </script>

    
</body>
